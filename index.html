<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Зурна Таана 🎨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#0f0f1a;color:#eaeaea;min-height:100vh;overflow-x:hidden}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:16px;gap:14px}
.screen.active{display:flex}
#home{background:radial-gradient(ellipse at 60% 40%,#1a0a2e,#0f0f1a);text-align:center}
.logo{font-size:clamp(3rem,13vw,5.5rem);font-weight:900;background:linear-gradient(135deg,#e94560,#f5a623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:glow 2s ease-in-out infinite alternate}
@keyframes glow{from{filter:drop-shadow(0 0 20px rgba(233,69,96,.3))}to{filter:drop-shadow(0 0 40px rgba(245,166,35,.6))}}
.tagline{color:#888;font-size:1rem;font-weight:700}
.card{background:#1a1a2e;border-radius:18px;padding:24px;width:100%;max-width:460px;border:1px solid rgba(255,255,255,.06);box-shadow:0 8px 40px rgba(0,0,0,.4)}
.btn{padding:14px 28px;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:900;cursor:pointer;transition:transform .15s,box-shadow .15s;outline:none;width:100%}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-red{background:linear-gradient(135deg,#e94560,#c0392b);color:white;box-shadow:0 4px 20px rgba(233,69,96,.4)}
.btn-blue{background:linear-gradient(135deg,#0f3460,#1a237e);color:white;box-shadow:0 4px 20px rgba(15,52,96,.4)}
.btn-green{background:linear-gradient(135deg,#00d084,#00b894);color:white;box-shadow:0 4px 20px rgba(0,208,132,.3)}
.btn-ghost{background:transparent;color:#888;font-size:.9rem;box-shadow:none}
input[type=text]{width:100%;padding:13px 16px;border:2px solid rgba(255,255,255,.1);border-radius:12px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:#eaeaea;background:rgba(255,255,255,.05);outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:#e94560}
input[type=text]::placeholder{color:#444}
label{font-size:.8rem;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px}
.sec-title{font-size:1.4rem;font-weight:900;text-align:center}
/* LOBBY */
.room-code-box{background:#16213e;border-radius:16px;padding:18px 28px;border:2px solid rgba(233,69,96,.3);text-align:center}
.rc-label{font-size:.75rem;color:#888;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.rc-val{font-size:2.8rem;font-weight:900;color:#e94560;letter-spacing:8px;margin-top:4px}
.players-list{width:100%;max-width:420px;display:flex;flex-direction:column;gap:8px}
.p-slot{display:flex;align-items:center;gap:10px;background:#1a1a2e;border-radius:12px;padding:12px 16px;border:1px solid rgba(255,255,255,.06)}
.p-slot.on{border-color:rgba(0,208,132,.3)}
.pdot{width:10px;height:10px;border-radius:50%;background:#333;flex-shrink:0}
.pdot.on{background:#00d084;box-shadow:0 0 8px #00d084}
.pname{font-weight:700}
.pstatus{font-size:.8rem;color:#888;margin-left:auto}
.waiter{display:flex;gap:6px;justify-content:center}
.wd{width:8px;height:8px;border-radius:50%;background:#555;animation:wb 1.2s ease-in-out infinite}
.wd:nth-child(2){animation-delay:.2s}.wd:nth-child(3){animation-delay:.4s}
@keyframes wb{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
/* WORD PICKER */
.word-opts{display:flex;flex-direction:column;gap:10px;width:100%;max-width:420px}
.wopt{padding:16px 20px;background:#1a1a2e;border:2px solid rgba(255,255,255,.08);border-radius:14px;font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:900;cursor:pointer;transition:all .15s;text-align:left;color:#eaeaea;display:flex;align-items:center;gap:12px}
.wopt:hover{border-color:#e94560;background:rgba(233,69,96,.1);transform:translateX(4px)}
.wcat{font-size:.7rem;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;display:block;margin-top:2px}
/* GAME */
#game-screen{padding:10px;justify-content:flex-start;padding-top:10px}
.g-header{width:100%;max-width:700px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rbadge{background:#e94560;color:white;border-radius:50px;padding:5px 12px;font-size:.82rem;font-weight:900}
.sbadges{display:flex;gap:6px;margin-left:auto}
.sbadge{background:#1a1a2e;border-radius:50px;padding:5px 10px;font-size:.82rem;font-weight:700;border:1px solid rgba(255,255,255,.08)}
.sbadge.me{border-color:#00d084;color:#00d084}
.tbar-wrap{width:100%;max-width:700px}
.tbar-bg{height:7px;background:rgba(255,255,255,.08);border-radius:7px;overflow:hidden}
.tbar-fill{height:100%;border-radius:7px;transition:width 1s linear,background 1s}
.word-strip{width:100%;max-width:700px;text-align:center;background:#1a1a2e;border-radius:12px;padding:10px 16px;border:1px solid rgba(255,255,255,.06)}
.ws-label{font-size:.72rem;color:#888;font-weight:700;letter-spacing:1px}
.ws-val{font-size:1.4rem;font-weight:900;letter-spacing:4px;font-family:monospace;color:#f5a623;margin-top:2px}
/* CANVAS */
.canvas-wrap{width:100%;max-width:700px;border-radius:16px;overflow:hidden;border:3px solid rgba(255,255,255,.15);background:#fff;min-height:200px}
#drawCanvas{display:block;width:100%;height:auto;touch-action:none;cursor:crosshair;background:#fff}
/* TOOLS */
.tools{width:100%;max-width:700px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;background:#1a1a2e;border-radius:14px;padding:10px 12px;border:1px solid rgba(255,255,255,.06)}
.colors{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.cdot:hover{transform:scale(1.2)}
.cdot.active{border-color:white;transform:scale(1.2)}
.tsep{width:1px;height:30px;background:rgba(255,255,255,.1);flex-shrink:0}
.sbtns{display:flex;gap:4px;align-items:center}
.sbtn{width:32px;height:32px;border-radius:9px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.sbtn.active{border-color:#e94560;background:rgba(233,69,96,.15)}
.sdot{background:white;border-radius:50%}
.tbtn{width:32px;height:32px;border-radius:9px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);cursor:pointer;font-size:.95rem;transition:all .15s;display:flex;align-items:center;justify-content:center}
.tbtn.active{border-color:#0f3460;background:rgba(15,52,96,.3)}
/* STATUS */
.sbar{background:#16213e;border-radius:10px;padding:8px 14px;font-size:.85rem;font-weight:700;color:#888;width:100%;max-width:700px;text-align:center;border:1px solid rgba(255,255,255,.05)}
.sbar.drawing{color:#f5a623;border-color:rgba(245,166,35,.3)}
.sbar.guessing{color:#00d084;border-color:rgba(0,208,132,.3)}
/* CHAT */
.chat-box{width:100%;max-width:700px;max-height:100px;overflow-y:auto;background:#1a1a2e;border-radius:12px;padding:8px 12px;display:flex;flex-direction:column;gap:3px;border:1px solid rgba(255,255,255,.06)}
.cmsg{font-size:.85rem;line-height:1.4}
.cmsg .who{font-weight:900;color:#f5a623}
.cmsg.correct{background:rgba(0,208,132,.15);border-radius:6px;padding:3px 7px}
.cmsg.correct .who{color:#00d084}
.grow{width:100%;max-width:700px;display:flex;gap:8px}
.grow input{flex:1}
/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;animation:fi .2s ease}
.obox{background:#1a1a2e;border-radius:18px;padding:32px 24px;text-align:center;max-width:380px;width:100%;border:1px solid rgba(255,255,255,.1);animation:pop .3s cubic-bezier(.36,1.5,.64,1) both}
.oemoji{font-size:4.5rem}
.otitle{font-size:1.7rem;font-weight:900;margin-top:8px}
.osub{color:#888;font-size:.95rem;margin-top:5px}
.oword{font-size:1.9rem;font-weight:900;color:#f5a623;margin-top:6px}
/* WINNER */
#winner-screen{text-align:center}
.trophy{font-size:5.5rem;animation:spin-in .5s cubic-bezier(.36,1.5,.64,1) both}
.wname{font-size:2.6rem;font-weight:900;color:#e94560}
.fscores{width:100%;max-width:420px;display:flex;flex-direction:column;gap:8px}
.frow{display:flex;align-items:center;justify-content:space-between;background:#1a1a2e;border-radius:12px;padding:12px 16px;border:1px solid rgba(255,255,255,.06)}
.frow.win{border-color:#e94560}
.pts{background:#f5a623;color:#1a1a1a;border-radius:50px;padding:4px 12px;font-weight:900}
/* CONFETTI */
.cw{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.cp{position:absolute;width:10px;height:13px;border-radius:3px;animation:cf 1.6s ease-in forwards}
@keyframes cf{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes pop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes spin-in{0%{transform:rotate(-180deg) scale(0);opacity:0}100%{transform:rotate(0) scale(1);opacity:1}}
@keyframes fi{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="logo">Зурна Таана</div>
  <div class="tagline">✏️ Зурна — 🔍 Таана — 🌐 Real-time</div>
  <div class="card" style="display:flex;flex-direction:column;gap:12px">
    <div><label>Таны нэр</label><input type="text" id="hname" placeholder="Нэрээ оруулна уу" maxlength="15"></div>
    <button class="btn btn-red" onclick="createRoom()">🎮 Өрөө үүсгэх</button>
    <div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:1px;background:rgba(255,255,255,.08)"></div><span style="color:#555;font-size:.8rem;font-weight:700">эсвэл</span><div style="flex:1;height:1px;background:rgba(255,255,255,.08)"></div></div>
    <div><label>Өрөөний код</label><input type="text" id="jcode" placeholder="XXXX" maxlength="6" style="text-transform:uppercase;letter-spacing:4px;font-size:1.2rem;text-align:center"></div>
    <button class="btn btn-blue" onclick="joinRoom()">🚪 Нэгдэх</button>
  </div>
  <div id="herr" style="color:#e94560;font-size:.9rem;font-weight:700;min-height:18px"></div>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
  <div class="sec-title">🎯 Тоглогчид</div>
  <div class="room-code-box"><div class="rc-label">Өрөөний код</div><div class="rc-val" id="lcode">????</div></div>
  <div style="color:#888;font-size:.88rem;font-weight:700">Найздаа энэ кодыг илгээгээрэй 📲</div>
  <div class="players-list" id="plist"></div>
  <div class="waiter" id="waiter"><div class="wd"></div><div class="wd"></div><div class="wd"></div></div>
  <button class="btn btn-green" id="startbtn" onclick="startGame()" style="display:none;max-width:300px">▶ Тоглоом эхлэх</button>
  <div style="color:#888;font-size:.85rem;font-weight:700" id="lstatus">2-р тоглогчийг хүлээж байна...</div>
  <button class="btn btn-ghost" style="max-width:200px" onclick="leaveGame()">← Гарах</button>
</div>

<!-- WORD PICKER -->
<div id="word-picker" class="screen">
  <div class="sec-title" id="ptitle">✏️ Үгээ сонгоно уу</div>
  <div style="color:#888;font-size:.92rem;font-weight:700">Аль үгийг зурах вэ?</div>
  <div class="word-opts" id="wopts"></div>
</div>

<!-- WAITING FOR DRAWER -->
<div id="waiting-draw" class="screen">
  <div style="font-size:3.5rem">⏳</div>
  <div class="sec-title" id="wdtext">Зурагч үгээ сонгож байна...</div>
  <div class="waiter"><div class="wd"></div><div class="wd"></div><div class="wd"></div></div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="g-header">
    <div class="rbadge" id="ground">1/5</div>
    <div id="gdlabel" style="font-size:.85rem;font-weight:700;color:#888"></div>
    <div class="sbadges" id="gscores"></div>
    <div id="gtval" style="font-size:1.2rem;font-weight:900;color:#e94560">80</div>
  </div>
  <div class="tbar-wrap"><div class="tbar-bg"><div class="tbar-fill" id="gtbar"></div></div></div>
  <div class="word-strip"><div class="ws-label" id="wslabel">ЗУРАХ ҮГ</div><div class="ws-val" id="wsval">_ _ _</div></div>
  <div class="canvas-wrap"><canvas id="drawCanvas"></canvas></div>
  <div class="tools" id="tools">
    <div class="colors" id="cpal"></div>
    <div class="tsep"></div>
    <div class="sbtns" id="sbtns"></div>
    <div class="tsep"></div>
    <button class="tbtn" id="ebtn" onclick="toggleEraser()">🩹</button>
    <button class="tbtn" onclick="doClear()">🗑️</button>
  </div>
  <div class="sbar" id="sbar">...</div>
  <div class="chat-box" id="chatbox"></div>
  <div class="grow" id="grow" style="display:none">
    <input type="text" id="ginput" placeholder="Таамаглалаа бич..." maxlength="40" onkeydown="if(event.key==='Enter')submitGuess()">
    <button class="btn btn-green" style="width:auto;padding:13px 20px" onclick="submitGuess()">Таах</button>
  </div>
</div>

<!-- WINNER -->
<div id="winner-screen" class="screen">
  <div class="trophy">🏆</div>
  <div style="font-size:.9rem;color:#888;font-weight:700;letter-spacing:2px;text-transform:uppercase">ЯЛАГЧ</div>
  <div class="wname" id="wname"></div>
  <div class="fscores" id="wscores"></div>
  <button class="btn btn-red" style="max-width:300px" onclick="playAgain()">🔄 Дахин тоглох</button>
  <button class="btn btn-ghost" style="max-width:200px" onclick="leaveGame()">Нүүр хуудас</button>
</div>

<div class="cw" id="cw"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, push, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyAFG5MZbbCeJylvDvbH5Do0iYkh312LOgY",
  authDomain:"zurna-taana.firebaseapp.com",
  databaseURL:"https://zurna-taana-default-rtdb.firebaseio.com",
  projectId:"zurna-taana",
  storageBucket:"zurna-taana.firebasestorage.app",
  messagingSenderId:"396936627739",
  appId:"1:396936627739:web:89edde5ed117ffbf465abe"
});
const db = getDatabase(app);

const WORDS=[
  {w:"Нар",c:"Байгаль"},{w:"Сар",c:"Байгаль"},{w:"Уул",c:"Байгаль"},{w:"Гол",c:"Байгаль"},{w:"Мод",c:"Байгаль"},{w:"Цас",c:"Байгаль"},
  {w:"Аянга",c:"Цаг"},{w:"Бороо",c:"Цаг"},{w:"Солонго",c:"Цаг"},{w:"Шуурга",c:"Цаг"},
  {w:"Нохой",c:"Амьтан"},{w:"Муур",c:"Амьтан"},{w:"Морь",c:"Амьтан"},{w:"Загас",c:"Амьтан"},{w:"Арслан",c:"Амьтан"},{w:"Заан",c:"Амьтан"},{w:"Шувуу",c:"Амьтан"},{w:"Могой",c:"Амьтан"},{w:"Туулай",c:"Амьтан"},{w:"Баавгай",c:"Амьтан"},
  {w:"Машин",c:"Тээвэр"},{w:"Галт тэрэг",c:"Тээвэр"},{w:"Онгоц",c:"Тээвэр"},{w:"Дугуй",c:"Тээвэр"},{w:"Завь",c:"Тээвэр"},
  {w:"Бургер",c:"Хоол"},{w:"Пицца",c:"Хоол"},{w:"Торт",c:"Хоол"},{w:"Алим",c:"Жимс"},{w:"Тарвас",c:"Жимс"},{w:"Гадил",c:"Жимс"},
  {w:"Гэр",c:"Байшин"},{w:"Гүүр",c:"Байгуулмал"},{w:"Цамхаг",c:"Байгуулмал"},
  {w:"Харандаа",c:"Зүйл"},{w:"Аяга",c:"Зүйл"},{w:"Толь",c:"Зүйл"},{w:"Цүнх",c:"Зүйл"},{w:"Малгай",c:"Хувцас"},{w:"Гутал",c:"Хувцас"},
  {w:"Нүд",c:"Бие"},{w:"Хамар",c:"Бие"},{w:"Гар",c:"Бие"},{w:"Хөл",c:"Бие"},
];

let myId=Math.random().toString(36).slice(2,9);
let myName='',roomCode='',roomRef=null,isHost=false,isDrawer=false;
let currentWord='',timerInterval=null,timeLeft=80,roundActive=false;
let lastChatLen=0,lastStrokeCount=0;

// Canvas
let canvas,ctx,drawing=false,isEraser=false,brushSize=6,brushColor='#222222';
let lastX=0,lastY=0;
const COLORS=['#222222','#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#e91e63','#ffffff'];

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}
function herr(m){document.getElementById('herr').textContent=m}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<4;i++)r+=c[Math.floor(Math.random()*c.length)];return r}
function norm(s){return s.toLowerCase().trim().replace(/\s+/g,'')}

// ── CREATE / JOIN ──
window.createRoom=async function(){
  myName=document.getElementById('hname').value.trim()||'Тоглогч';
  roomCode=genCode();isHost=true;
  roomRef=ref(db,'rooms/'+roomCode);
  await set(roomRef,{host:myId,state:'lobby',round:0,totalRounds:5,players:{[myId]:{name:myName,score:0,online:true}},drawerId:myId});
  listenRoom();
  document.getElementById('lcode').textContent=roomCode;
  show('lobby');
}

window.joinRoom=async function(){
  myName=document.getElementById('hname').value.trim()||'Тоглогч';
  const code=document.getElementById('jcode').value.trim().toUpperCase();
  if(!code||code.length<4){herr('Өрөөний кодоо оруулна уу');return}
  const snap=await get(ref(db,'rooms/'+code));
  if(!snap.exists()){herr('Өрөө олдсонгүй');return}
  const d=snap.val();
  const players=d.players||{};
  if(Object.keys(players).length>=2){herr('Өрөө дүүрсэн');return}
  roomCode=code;roomRef=ref(db,'rooms/'+code);
  await update(ref(db,'rooms/'+code+'/players/'+myId),{name:myName,score:0,online:true});
  listenRoom();
  document.getElementById('lcode').textContent=code;
  show('lobby');
}

window.leaveGame=function(){
  clearInterval(timerInterval);
  if(roomRef)update(ref(db,'rooms/'+roomCode+'/players/'+myId),{online:false});
  location.reload();
}

// ── LISTEN ──
function listenRoom(){
  onValue(roomRef,snap=>{
    if(!snap.exists())return;
    handleUpdate(snap.val());
  });
}

function handleUpdate(d){
  updateLobby(d);
  if(d.state==='picking'){
    clearInterval(timerInterval);roundActive=false;
    isDrawer=d.drawerId===myId;
    if(isDrawer){showPicker(d)}
    else{
      const dn=(d.players||{})[d.drawerId]?.name||'Зурагч';
      document.getElementById('wdtext').textContent=dn+' үгээ сонгож байна...';
      show('waiting-draw');
    }
  }
  if(d.state==='drawing'){
    if(d.word&&isDrawer)currentWord=d.word;
    showGame(d);
    if(!isDrawer)doSyncStrokes(d);
  }
  if(d.state==='roundend'){clearInterval(timerInterval);roundActive=false;showRoundEnd(d)}
  if(d.state==='gameover'){clearInterval(timerInterval);showWinner(d)}
  if(d.chat)renderChat(d.chat);
}

// ── LOBBY ──
function updateLobby(d){
  if(!document.getElementById('lobby').classList.contains('active'))return;
  const players=d.players||{};
  const list=document.getElementById('plist');
  list.innerHTML='';
  Object.entries(players).forEach(([id,p])=>{
    const div=document.createElement('div');
    div.className='p-slot'+(p.online?' on':'');
    div.innerHTML=`<div class="pdot ${p.online?'on':''}"></div><div class="pname">${p.name}${id===myId?' (Та)':''}</div><div class="pstatus">${p.online?'✅ Онлайн':'⭕'}</div>`;
    list.appendChild(div);
  });
  const cnt=Object.values(players).filter(p=>p.online).length;
  if(cnt>=2&&isHost){
    document.getElementById('startbtn').style.display='block';
    document.getElementById('waiter').style.display='none';
    document.getElementById('lstatus').textContent='Тоглоом эхлэхэд бэлэн!';
  }else if(cnt>=2){
    document.getElementById('lstatus').textContent='Хост тоглоомыг эхлүүлнэ...';
    document.getElementById('waiter').style.display='none';
  }
}

window.startGame=async function(){
  const snap=await get(ref(db,'rooms/'+roomCode+'/players'));
  const players=snap.val()||{};
  const ids=Object.keys(players).filter(id=>players[id].online);
  if(ids.length<2)return;
  await update(roomRef,{state:'picking',round:1,drawerId:ids[0],guesserId:ids[1],correctGuess:false,strokes:null,chat:null,word:null,hint:null,startTime:null});
}

// ── PICKER ──
function showPicker(d){
  const words=[...WORDS].sort(()=>Math.random()-.5).slice(0,3);
  document.getElementById('ptitle').textContent='✏️ '+myName+', үгээ сонгоно уу!';
  const c=document.getElementById('wopts');c.innerHTML='';
  words.forEach((o,i)=>{
    const b=document.createElement('button');b.className='wopt';
    b.innerHTML=`<span>${['🟥','🟦','🟨'][i]}</span><span>${o.w}<span class="wcat">${o.c}</span></span>`;
    b.onclick=()=>pickWord(o.w);
    c.appendChild(b);
  });
  show('word-picker');
}

async function pickWord(word){
  currentWord=word;
  lastStrokeCount=0;lastChatLen=0;roundActive=false;
  await update(roomRef,{state:'drawing',word:word,hint:makeHint(word),strokes:null,chat:null,correctGuess:false,startTime:Date.now()});
  // Clear canvas
  if(ctx){ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height)}
}

function makeHint(w){return w.split('').map((c,i)=>i===0?c:'_').join(' ')}

// ── GAME SCREEN ──
function showGame(d){
  show('game-screen');
  initCanvas();

  const players=d.players||{};
  document.getElementById('ground').textContent=`${d.round||1}/${d.totalRounds||5}`;
  document.getElementById('gdlabel').textContent=isDrawer?'✏️ Та зурж байна':`👀 ${(players[d.drawerId]||{}).name||'?'} зурж байна`;

  // scores
  const sb=document.getElementById('gscores');sb.innerHTML='';
  Object.entries(players).forEach(([id,p])=>{
    if(!p.online)return;
    const el=document.createElement('div');
    el.className='sbadge'+(id===myId?' me':'');
    el.textContent=`${p.name}: ${p.score||0}`;
    sb.appendChild(el);
  });

  // word
  if(isDrawer){
    document.getElementById('wslabel').textContent='ЗУРАХ ҮГ';
    document.getElementById('wsval').textContent=currentWord||d.word||'';
  }else{
    document.getElementById('wslabel').textContent='ТААХ ҮГ';
    document.getElementById('wsval').textContent=d.hint||'_ _ _';
  }

  document.getElementById('tools').style.display=isDrawer?'flex':'none';
  document.getElementById('grow').style.display=isDrawer?'none':'flex';
  canvas.style.cursor=isDrawer?'crosshair':'default';

  const sb2=document.getElementById('sbar');
  sb2.className='sbar '+(isDrawer?'drawing':'guessing');
  sb2.textContent=isDrawer?'🖌️ Зур! Таагч таах болно':'🔍 Зургийг харж таа!';

  if(!roundActive){roundActive=true;startTimer(d)}
}

// ── CANVAS ──
function initCanvas(){
  canvas=document.getElementById('drawCanvas');
  ctx=canvas.getContext('2d');
  const w=canvas.parentElement.clientWidth;
  const h=Math.round(Math.min(w*0.65,380));
  canvas.width=w;
  canvas.height=h;
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,w,h);
  ctx.lineCap='round';ctx.lineJoin='round';
  setupColors();setupSizes();
  // Remove old events by cloning only if drawer
  if(isDrawer){
    canvas.onmousedown=startDraw;
    canvas.onmousemove=moveDraw;
    canvas.onmouseup=endDraw;
    canvas.onmouseleave=endDraw;
    canvas.ontouchstart=e=>{e.preventDefault();startDraw(e.touches[0])};
    canvas.ontouchmove=e=>{e.preventDefault();moveDraw(e.touches[0])};
    canvas.ontouchend=endDraw;
  }else{
    canvas.onmousedown=null;canvas.onmousemove=null;canvas.onmouseup=null;
    canvas.ontouchstart=null;canvas.ontouchmove=null;canvas.ontouchend=null;
  }
}

function getXY(e){
  const r=canvas.getBoundingClientRect();
  const sx=canvas.width/r.width,sy=canvas.height/r.height;
  return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};
}

function startDraw(e){
  drawing=true;
  const{x,y}=getXY(e);lastX=x;lastY=y;
  ctx.beginPath();ctx.moveTo(x,y);
}

function moveDraw(e){
  if(!drawing)return;
  const{x,y}=getXY(e);
  if(isEraser){
    ctx.save();ctx.globalCompositeOperation='destination-out';
    ctx.beginPath();ctx.arc(x,y,brushSize*2.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
    queueStroke({t:'e',x,y,s:brushSize*2.5});
  }else{
    ctx.strokeStyle=brushColor;ctx.lineWidth=brushSize;
    ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);ctx.stroke();
    queueStroke({t:'l',x1:lastX,y1:lastY,x2:x,y2:y,c:brushColor,s:brushSize});
  }
  lastX=x;lastY=y;
}

function endDraw(){drawing=false;ctx.beginPath()}

function setupColors(){
  const pal=document.getElementById('cpal');pal.innerHTML='';
  COLORS.forEach((c,i)=>{
    const d=document.createElement('div');d.className='cdot'+(i===0?' active':'');
    d.style.background=c;
    if(c==='#ffffff')d.style.outline='2px solid #555';
    d.onclick=()=>{
      isEraser=false;document.getElementById('ebtn').classList.remove('active');
      document.querySelectorAll('.cdot').forEach(x=>x.classList.remove('active'));
      d.classList.add('active');brushColor=c;
    };
    pal.appendChild(d);
  });
}

function setupSizes(){
  const sizes=[{s:4,d:7},{s:9,d:13},{s:18,d:19}];
  const wrap=document.getElementById('sbtns');wrap.innerHTML='';
  sizes.forEach((sz,i)=>{
    const b=document.createElement('button');b.className='sbtn'+(i===0?' active':'');
    const dot=document.createElement('div');dot.className='sdot';dot.style.cssText=`width:${sz.d}px;height:${sz.d}px`;
    b.appendChild(dot);
    b.onclick=()=>{brushSize=sz.s;document.querySelectorAll('.sbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active')};
    wrap.appendChild(b);
  });
}

window.toggleEraser=function(){isEraser=!isEraser;document.getElementById('ebtn').classList.toggle('active',isEraser)}

window.doClear=async function(){
  if(ctx){ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height)}
  await push(ref(db,'rooms/'+roomCode+'/strokes'),{t:'c'});
}

// ── STROKE QUEUE ──
let strokeQ=[];let strokeTimer=null;
function queueStroke(s){
  strokeQ.push(s);
  if(!strokeTimer)strokeTimer=setTimeout(flushQ,60);
}
async function flushQ(){
  strokeTimer=null;
  if(!strokeQ.length)return;
  const batch=[...strokeQ];strokeQ=[];
  for(const s of batch)await push(ref(db,'rooms/'+roomCode+'/strokes'),s);
}

// ── SYNC STROKES (viewer) ──
function doSyncStrokes(d){
  if(isDrawer)return;
  if(!ctx)return;
  const raw=d.strokes||{};
  const arr=Array.isArray(raw)?raw:Object.values(raw);
  if(arr.length<=lastStrokeCount)return;
  const news=arr.slice(lastStrokeCount);
  lastStrokeCount=arr.length;
  news.forEach(s=>{
    if(!s)return;
    if(s.t==='c'){ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height)}
    else if(s.t==='e'){ctx.save();ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,Math.PI*2);ctx.fill();ctx.restore()}
    else if(s.t==='l'){
      ctx.strokeStyle=s.c;ctx.lineWidth=s.s;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();
    }
  });
}

// ── TIMER ──
function startTimer(d){
  clearInterval(timerInterval);
  const dur=80;
  const elapsed=d.startTime?Math.floor((Date.now()-d.startTime)/1000):0;
  timeLeft=Math.max(0,dur-elapsed);
  updTimer(timeLeft,dur);
  timerInterval=setInterval(()=>{
    timeLeft--;updTimer(timeLeft,dur);
    if(timeLeft<=0){clearInterval(timerInterval);if(isHost)endRound(false,'')}
  },1000);
}

function updTimer(t,max){
  const pct=Math.max(0,(t/max)*100);
  const bar=document.getElementById('gtbar');
  bar.style.width=pct+'%';
  bar.style.background=pct>50?'linear-gradient(90deg,#00d084,#0984e3)':pct>25?'linear-gradient(90deg,#fdcb6e,#e17055)':'linear-gradient(90deg,#e94560,#c0392b)';
  document.getElementById('gtval').textContent=t;
}

// ── GUESS ──
window.submitGuess=async function(){
  const inp=document.getElementById('ginput');
  const guess=inp.value.trim();if(!guess)return;
  inp.value='';
  const snap=await get(roomRef);const d=snap.val();
  if(!d||d.correctGuess)return;
  const correct=norm(guess)===norm(d.word||'');
  await push(ref(db,'rooms/'+roomCode+'/chat'),{who:myName,msg:guess,correct,ts:Date.now()});
  if(correct){
    const cur=(d.players||{})[myId]?.score||0;
    await update(ref(db,'rooms/'+roomCode+'/players/'+myId),{score:cur+1});
    await update(roomRef,{correctGuess:true});
    clearInterval(timerInterval);
    if(isHost)setTimeout(()=>endRound(true,myName),1500);
  }
}

// ── CHAT ──
function renderChat(chatObj){
  const msgs=Object.values(chatObj||{}).sort((a,b)=>a.ts-b.ts);
  if(msgs.length<=lastChatLen)return;
  lastChatLen=msgs.length;
  const box=document.getElementById('chatbox');box.innerHTML='';
  msgs.forEach(m=>{
    const div=document.createElement('div');div.className='cmsg'+(m.correct?' correct':'');
    div.innerHTML=`<span class="who">${m.who}:</span> ${m.correct?'🎉 ':''}${m.msg}`;
    box.appendChild(div);
  });
  box.scrollTop=box.scrollHeight;
}

// ── ROUND END ──
async function endRound(correct,guesser){
  if(!isHost)return;
  const snap=await get(roomRef);const d=snap.val();if(!d)return;
  await update(roomRef,{state:'roundend',lastCorrect:correct,lastGuesser:guesser,lastWord:d.word});
}

function showRoundEnd(d){
  clearInterval(timerInterval);
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="obox"><div class="oemoji">${d.lastCorrect?'🎉':'😅'}</div><div class="otitle">${d.lastCorrect?d.lastGuesser+' зөв тааллаа!':'Хугацаа дуусав!'}</div><div class="osub">Зурсан үг:</div><div class="oword">${d.lastWord||''}</div></div>`;
  document.body.appendChild(ov);
  if(d.lastCorrect)confetti();
  setTimeout(()=>{ov.remove();if(isHost)nextRound(d)},2500);
}

async function nextRound(d){
  const snap=await get(ref(db,'rooms/'+roomCode+'/players'));
  const players=snap.val()||{};
  const ids=Object.keys(players).filter(id=>players[id].online);
  const nr=(d.round||1)+1;
  if(nr>(d.totalRounds||5)){await update(roomRef,{state:'gameover'});return}
  const ci=ids.indexOf(d.drawerId);
  const ni=(ci+1)%ids.length;
  lastStrokeCount=0;lastChatLen=0;roundActive=false;
  await update(roomRef,{state:'picking',round:nr,drawerId:ids[ni],guesserId:ids[1-ni],strokes:null,chat:null,correctGuess:false,word:null,hint:null,startTime:null});
}

// ── WINNER ──
function showWinner(d){
  const players=d.players||{};
  let mx=-1,wn='';
  Object.values(players).forEach(p=>{if((p.score||0)>mx){mx=p.score;wn=p.name}});
  document.getElementById('wname').textContent=wn;
  const fs=document.getElementById('wscores');fs.innerHTML='';
  Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0)).forEach(([id,p])=>{
    const div=document.createElement('div');div.className='frow'+((p.score||0)===mx?' win':'');
    div.innerHTML=`<span style="font-weight:900">${p.name}${id===myId?' (Та)':''}</span><span class="pts">${p.score||0} оноо</span>`;
    fs.appendChild(div);
  });
  show('winner-screen');confetti();
}

window.playAgain=async function(){
  if(!isHost)return;
  const snap=await get(ref(db,'rooms/'+roomCode+'/players'));
  const players=snap.val()||{};
  const rp={};Object.keys(players).forEach(id=>{rp[id]={...players[id],score:0}});
  const ids=Object.keys(rp).filter(id=>rp[id].online);
  lastStrokeCount=0;lastChatLen=0;roundActive=false;
  await update(roomRef,{state:'picking',round:1,players:rp,drawerId:ids[0],guesserId:ids[1],strokes:null,chat:null,correctGuess:false,word:null,hint:null,startTime:null});
}

// ── CONFETTI ──
function confetti(){
  const w=document.getElementById('cw');w.innerHTML='';
  const c=['#e94560','#00d084','#f5a623','#a29bfe','#0984e3'];
  for(let i=0;i<55;i++){const p=document.createElement('div');p.className='cp';p.style.cssText=`left:${Math.random()*100}%;top:-20px;background:${c[Math.floor(Math.random()*c.length)]};transform:rotate(${Math.random()*360}deg);animation-delay:${Math.random()*.6}s;animation-duration:${1.2+Math.random()*.8}s`;w.appendChild(p)}
  setTimeout(()=>w.innerHTML='',3500);
}
</script>
